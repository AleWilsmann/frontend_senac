    <div class="container mt-5">

    <h2 class="mb-4">🛒 Seu Carrinho</h2>

    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Total</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="lista-carrinho">

            </tbody>
        </table>
    </div>

  
    <div class="text-end mt-4">
        <h4>Total: <span id="total-carrinho">R$ 0,00</span></h4>
    </div>


   
    <div class="d-flex justify-content-between mt-4">
        <a href="produtos.html" class="btn btn-secondary">
            Continuar comprando
        </a>

        <button class="btn btn-success">
            Finalizar compra
        </button>
    </div>

</div>

<script>
function carregarCarrinho(){
    
    const lista = document.getElementById("lista-carrinho");
    const totalSpan = document.getElementById("total-carrinho");

    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
    lista.innerHTML = "";

    let total = 0;

    carrinho.forEach((produto, index) => {


        lista.innerHTML += `
        <tr>
            <td>
                <strong>${produto.nome}</strong><br>
                <small>${produto.descricao}</small>
            </td>
            <td>${produto.preco.toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</td>
            <td>${produto.quantidade}</td>
            <td>${(produto.preco * produto.quantidade).toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="removerItem(${index})">
                    Remover
                </button>
            </td>
        </tr>
        `;
        total += produto.preco * produto.quantidade;
    });

    totalSpan.innerText = total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    
}

function removerItem(index){

    let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

    if (index < 0 || index >= carrinho.length) return;

    const nomeProduto = carrinho[index].nome;
    
     if (!confirm(`Tem certeza que deseja remover "${nomeProduto}" do carrinho?`)) {
        return;
    }
    carrinho.splice(index,1);

    localStorage.setItem("carrinho", JSON.stringify(carrinho));

    carregarCarrinho();
    atualizarContadorCarrinho();
}

carregarCarrinho();
</script>

<!-- Modal de Finalização de Compra -->
<div class="modal fade" id="modalCheckout" tabindex="-1" aria-labelledby="modalCheckoutLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <button id="btn-finalizar" class="btn btn-success">
            Finalizar compra
        </button>
      </div>
      
      <div class="modal-body">
        <form id="form-checkout">
          <div class="row g-3">
            <div class="col-md-4">
              <label for="cep" class="form-label">CEP</label>
              <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" required>
            </div>
            <div class="col-md-8">
              <label for="rua" class="form-label">Rua / Logradouro</label>
              <input type="text" class="form-control" id="rua" readonly>
            </div>
            <div class="col-md-6">
              <label for="bairro" class="form-label">Bairro</label>
              <input type="text" class="form-control" id="bairro" readonly>
            </div>
            <div class="col-md-4">
              <label for="cidade" class="form-label">Cidade</label>
              <input type="text" class="form-control" id="cidade" readonly>
            </div>
            <div class="col-md-2">
              <label for="estado" class="form-label">UF</label>
              <input type="text" class="form-control" id="estado" maxlength="2" readonly>
            </div>
            <!-- Pode adicionar mais campos: nome, email, número, complemento, etc. -->
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-success w-100">Confirmar Pedido</button>
          </div>
        </form>

        <div id="area-alertas-checkout" class="mt-3"></div>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      </div>
    </div>
  </div>
</div>



<script type="module" src="js/main.js"></script>
